{% extends "base.html" %}
{% block title %}Login – Home Movies{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow" style="border-top: 3px solid var(--accent);">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi {{ current_theme.icon }}" style="font-size: 3rem; color: var(--accent);"></i>
          <h3 class="mt-2" style="color: var(--accent);">Home Movies</h3>
          <small style="color: var(--text-color); opacity: .6;">Sign in to access your collection</small>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <div class="input-group">
              <span class="input-group-text" style="background: rgba(0,0,0,.3); border-color: rgba(255,255,255,.15); color: var(--accent);">
                <i class="bi bi-person"></i>
              </span>
              <input type="text" class="form-control" id="username" name="username"
                     required autofocus autocomplete="username">
            </div>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text" style="background: rgba(0,0,0,.3); border-color: rgba(255,255,255,.15); color: var(--accent);">
                <i class="bi bi-lock"></i>
              </span>
              <input type="password" class="form-control" id="password" name="password"
                     required autocomplete="current-password">
            </div>
          </div>
          <button type="submit" class="btn btn-accent w-100 mt-2">
            <i class="bi bi-box-arrow-in-right"></i> Sign In
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
